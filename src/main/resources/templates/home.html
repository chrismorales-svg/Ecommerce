<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>

    <div th:replace="~{Navbar :: navbar}"></div>

    <!-- Hero -->
    <div class="hero">
        <h1>Bienvenido a <span>Mi Tienda</span></h1>
        <p>Encuentra los mejores productos y ofertas de tus supermercados favoritos.</p>
    </div>

    <!-- Sección de productos -->
    <div class="section">
        <div class="section-header">
            <h2 class="section-title">Productos <span>disponibles</span></h2>
            <div class="carousel-controls">
                <button class="carousel-btn" onclick="scrollCarousel('productos-track', -280)">&#8592;</button>
                <button class="carousel-btn" onclick="scrollCarousel('productos-track', 280)">&#8594;</button>
            </div>
        </div>

        <div class="carousel-wrapper">
            <div class="carousel-track" id="productos-track">

                <div class="product-card" th:each="producto : ${productos}">
                    <div class="product-image">
                        <img th:if="${producto.imagen != null and !producto.imagen.isEmpty()}"
                            th:src="${producto.imagen}" th:alt="${producto.nombre}" />
                        <div class="no-img" th:unless="${producto.imagen != null and !producto.imagen.isEmpty()}">
                            🛒
                        </div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-title" th:text="${producto.nombre}">Nombre</h3>
                        <p class="product-description" th:text="${producto.descripcion}">Descripción</p>
                        <div class="product-meta">
                            <span class="product-price"
                                th:text="${'$' + #numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">
                                $0
                            </span>
                            <span class="product-store" th:if="${producto.supermercado != null}"
                                th:text="${producto.supermercado.nombre}">
                            </span>
                        </div>
                        <button class="btn-buy">Comprar</button>
                    </div>
                </div>

                <div class="empty-carousel" th:if="${#lists.isEmpty(productos)}">
                    No hay productos disponibles por el momento.
                </div>

            </div>
        </div>
    </div>

    <script>
        function scrollCarousel(id, amount) {
            const track = document.getElementById(id);
            track.scrollBy({ left: amount, behavior: 'smooth' });
        }
    </script>

</body>

</html>
