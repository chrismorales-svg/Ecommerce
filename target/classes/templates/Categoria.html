<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${categoria} + ' — Mi Tienda'">Categoría</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>

<body>

    <div th:replace="~{Navbar :: navbar}"></div>

    <!-- Encabezado de categoría -->
    <div class="categoria-hero">
        <a href="/home" class="btn-volver">← Volver al inicio</a>
        <h1 class="categoria-hero-title" th:text="${categoria}">Categoría</h1>
        <p class="categoria-hero-sub" th:text="${productos.size()} + ' productos encontrados'">
            0 productos encontrados
        </p>
    </div>

    <!-- Grid completo de productos de la categoría -->
    <div class="section">
        <div class="categoria-grid categoria-grid--full">

            <div class="product-card" th:each="producto : ${productos}">
                <div class="product-image">
                    <img th:if="${producto.imagen != null and !producto.imagen.isEmpty()}" th:src="${producto.imagen}"
                        th:alt="${producto.nombre}" />
                    <div class="no-img" th:unless="${producto.imagen != null and !producto.imagen.isEmpty()}">
                        🛒
                    </div>
                </div>
                <div class="product-info">
                    <h3 class="product-title" th:text="${producto.nombre}">Nombre</h3>
                    <p class="product-description" th:text="${producto.descripcion}">Descripción</p>
                    <div class="product-meta">
                        <span class="product-price"
                            th:text="${'$' + #numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">
                            $0
                        </span>
                        <span class="product-store" th:if="${producto.supermercado != null}"
                            th:text="${producto.supermercado.nombre}">
                        </span>
                    </div>
                    <button class="btn-buy">Comprar</button>
                </div>
            </div>

            <div class="empty-carousel" th:if="${#lists.isEmpty(productos)}">
                No hay productos en esta categoría por el momento.
            </div>

        </div>
    </div>

</body>

</html>
