# ══════════════════════════════════════════════════
# Perfil de PRODUCCIÓN para Render
# Estas variables las configuras en el dashboard de Render
# ══════════════════════════════════════════════════

# Base de datos (usa las variables de entorno de Render)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto (Render asigna el puerto automáticamente)
server.port=${PORT:8080}

# OAuth2 Google (si lo usas)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=10000

# Desactiva el warning de open-in-view
spring.jpa.open-in-view=false

server.forward-headers-strategy=native