<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{css/styles.css}">
</head>

<body>
    <div th:fragment="navbar">
        <div class="navbar-top">
            <div class="navbar-search">
                <input type="text" class="search-input" placeholder="Buscar productos..." />
                <button class="search-btn">🔍</button>
            </div>

            <!-- Usuario logueado -->
            <div class="navbar-user" sec:authorize="isAuthenticated()">
                <div class="user-info">
                    <span class="user-name" th:text="${nombreUsuario}"></span>
                </div>
                <a href="/logout" class="btn-logout">Salir</a>
            </div>

            <!-- No logueado -->
            <div class="navbar-auth" sec:authorize="!isAuthenticated()">
                <a href="/creacuenta">Crea tu cuenta</a>
                <a href="/login" class="btn-login">Ingresa</a>
            </div>
        </div>

        <nav class="navbar">
            <ul class="navbar1">
                <li><a href="/">Categorias</a></li>
                <li><a href="/about">Ofertas</a></li>
                <li><a href="/contact">Supermercado</a></li>
                <li><a href="/services">Moda</a></li>
            </ul>
            <ul class="navbar2">
                <li>
                    <button class="btn-carrito-panel" onclick="abrirCarrito()" title="Mis compras">
                        🛒 <span>Mis compras</span>
                    </button>
                </li>
            </ul>
        </nav>

        <!-- Overlay oscuro -->
        <div class="carrito-overlay" id="carritoOverlay" onclick="cerrarCarrito()"></div>

        <!-- Panel lateral -->
        <div class="carrito-panel" id="carritoPanel">
            <div class="carrito-panel-header">
                <h3>🛒 Mi Carrito</h3>
                <button class="carrito-panel-cerrar" onclick="cerrarCarrito()">✕</button>
            </div>
            <div class="carrito-panel-body" id="carritoPanelBody">
                <div class="carrito-panel-loading">Cargando...</div>
            </div>
        </div>

        <style>
            .btn-carrito-panel {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 1rem;
                color: #333;
                padding: 0;
                font-family: inherit;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .btn-carrito-panel:hover {
                color: #22c55e;
            }

            /* Overlay */
            .carrito-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: 999;
                transition: opacity 0.3s;
            }

            .carrito-overlay.activo {
                display: block;
            }

            /* Panel lateral */
            .carrito-panel {
                position: fixed;
                top: 0;
                right: -480px;
                width: 100%;
                max-width: 480px;
                height: 100vh;
                background: #fff;
                z-index: 1000;
                box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
                display: flex;
                flex-direction: column;
                transition: right 0.35s cubic-bezier(.4,0,.2,1);
            }

            .carrito-panel.activo {
                right: 0;
            }

            .carrito-panel-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 20px 24px;
                border-bottom: 1px solid #f0f0f0;
                background: #fff;
            }

            .carrito-panel-header h3 {
                margin: 0;
                font-size: 1.2rem;
                font-weight: 700;
            }

            .carrito-panel-cerrar {
                background: none;
                border: none;
                font-size: 1.3rem;
                cursor: pointer;
                color: #666;
                padding: 4px 8px;
                border-radius: 6px;
                line-height: 1;
            }

            .carrito-panel-cerrar:hover {
                background: #f0f0f0;
                color: #111;
            }

            .carrito-panel-body {
                flex: 1;
                overflow-y: auto;
                padding: 20px 24px;
            }

            .carrito-panel-loading {
                text-align: center;
                color: #999;
                padding: 40px 0;
                font-size: 1rem;
            }

            /* Items dentro del panel */
            .panel-item {
                display: flex;
                gap: 14px;
                align-items: center;
                padding: 14px 0;
                border-bottom: 1px solid #f5f5f5;
            }

            .panel-item img,
            .panel-item .no-img-panel {
                width: 60px;
                height: 60px;
                object-fit: cover;
                border-radius: 8px;
                flex-shrink: 0;
            }

            .no-img-panel {
                background: #f0f0f0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.4rem;
            }

            .panel-item-info {
                flex: 1;
                min-width: 0;
            }

            .panel-item-nombre {
                font-weight: 600;
                font-size: 0.95rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .panel-item-super {
                font-size: 0.8rem;
                color: #999;
            }

            .panel-item-precio {
                font-size: 0.9rem;
                color: #555;
                margin-top: 4px;
            }

            .panel-item-cantidad {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-top: 6px;
            }

            .panel-item-cantidad input {
                width: 50px;
                padding: 4px 6px;
                border: 1px solid #ddd;
                border-radius: 6px;
                text-align: center;
                font-size: 0.85rem;
            }

            .panel-btn-act {
                background: #f0f0f0;
                border: none;
                border-radius: 6px;
                padding: 4px 8px;
                cursor: pointer;
                font-size: 0.85rem;
            }

            .panel-btn-elim {
                background: #fee2e2;
                color: #dc2626;
                border: none;
                border-radius: 6px;
                padding: 5px 8px;
                cursor: pointer;
                font-size: 0.8rem;
                white-space: nowrap;
            }

            .panel-vacio {
                text-align: center;
                color: #aaa;
                padding: 60px 0;
                font-size: 1rem;
            }

            .panel-footer {
                border-top: 2px solid #f0f0f0;
                padding: 20px 24px;
                background: #fff;
            }

            .panel-total {
                display: flex;
                justify-content: space-between;
                font-size: 1.15rem;
                font-weight: 700;
                margin-bottom: 16px;
            }

            .panel-total span {
                color: #22c55e;
            }

            .panel-acciones {
                display: flex;
                gap: 10px;
            }

            .panel-btn-vaciar {
                flex: 1;
                background: #fee2e2;
                color: #dc2626;
                border: none;
                border-radius: 8px;
                padding: 10px;
                cursor: pointer;
                font-size: 0.9rem;
                font-weight: 500;
            }

            .panel-btn-pagar {
                flex: 2;
                background: #22c55e;
                color: white;
                border: none;
                border-radius: 8px;
                padding: 10px;
                cursor: pointer;
                font-size: 0.9rem;
                font-weight: 700;
            }

            .panel-btn-pagar:hover { opacity: 0.9; }
            .panel-btn-vaciar:hover { background: #fecaca; }
        </style>

        <script>
            function abrirCarrito() {
                document.getElementById('carritoOverlay').classList.add('activo');
                document.getElementById('carritoPanel').classList.add('activo');
                document.body.style.overflow = 'hidden';
                cargarCarrito();
            }

            function cerrarCarrito() {
                document.getElementById('carritoOverlay').classList.remove('activo');
                document.getElementById('carritoPanel').classList.remove('activo');
                document.body.style.overflow = '';
            }

            function cargarCarrito() {
                const body = document.getElementById('carritoPanelBody');
                body.innerHTML = '<div class="carrito-panel-loading">Cargando...</div>';
                fetch('/carrito/panel')
                    .then(r => r.text())
                    .then(html => { body.innerHTML = html; })
                    .catch(() => {
                        body.innerHTML = '<div class="carrito-panel-loading">Error al cargar el carrito.</div>';
                    });
            }

            // Cerrar con tecla Escape
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') cerrarCarrito();
            });
        </script>
    </div>
</body>

</html>
