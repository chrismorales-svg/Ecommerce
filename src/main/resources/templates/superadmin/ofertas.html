<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Gestión de Ofertas</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div th:replace="~{Navbar :: navbar}"></div>

    <div class="container">
        <h1>Gestión de Ofertas</h1>
        <a th:href="@{/superadmin/dashboard}">← Volver al dashboard</a>

        <!-- Formulario crear oferta -->
        <div class="form-section">
            <h2>Agregar Oferta</h2>
            <form th:action="@{/superadmin/ofertas/guardar}" method="post" th:object="${oferta}">
                <div>
                    <label>Descripción</label>
                    <input type="text" th:field="*{descripcion}" placeholder="Descripción de la oferta" required />
                </div>
                <div>
                    <label>Descuento (%)</label>
                    <input type="number" step="0.01" min="0" max="100" th:field="*{descuento}" placeholder="20.0"
                        required />
                </div>
                <div>
                    <label>Fecha inicio</label>
                    <input type="date" th:field="*{fechaInicio}" required />
                </div>
                <div>
                    <label>Fecha fin</label>
                    <input type="date" th:field="*{fechaFin}" required />
                </div>
                <div>
                    <label>Producto</label>
                    <select th:field="*{producto}">
                        <option value="">-- Seleccionar producto --</option>
                        <option th:each="p : ${productos}" th:value="${p.id}" th:text="${p.nombre}">
                        </option>
                    </select>
                </div>
                <button type="submit">Guardar Oferta</button>
            </form>
        </div>

        <!-- Tabla de ofertas -->
        <div class="table-section">
            <h2>Ofertas registradas</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descripción</th>
                        <th>Descuento</th>
                        <th>Fecha inicio</th>
                        <th>Fecha fin</th>
                        <th>Producto</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${ofertas}">
                        <td th:text="${o.id}"></td>
                        <td th:text="${o.descripcion}"></td>
                        <td th:text="${o.descuento + '%'}"></td>
                        <td th:text="${o.fechaInicio}"></td>
                        <td th:text="${o.fechaFin}"></td>
                        <td th:text="${o.producto != null ? o.producto.nombre : 'Sin producto'}"></td>
                        <td>
                            <!-- Muestra si la oferta está activa o vencida -->
                            <span th:if="${o.fechaFin >= #temporals.createNow()}" style="color:green">Activa</span>
                            <span th:unless="${o.fechaFin >= #temporals.createNow()}" style="color:red">Vencida</span>
                        </td>
                        <td>
                            <a th:href="@{/superadmin/ofertas/eliminar/{id}(id=${o.id})}"
                                onclick="return confirm('¿Eliminar esta oferta?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ofertas)}">
                        <td colspan="8">No hay ofertas registradas</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
